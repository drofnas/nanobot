services:
  tailscale-research:
    image: tailscale/tailscale:latest
    container_name: nanobot-research-tailscale
    hostname: nanobot-research
    environment:
      # One-time auth on first boot; state persists across restarts.
      # Provide at runtime: NANOBOT_RESEARCH_TS_AUTHKEY="tskey-..." docker compose ... up -d
      - TS_AUTHKEY=${NANOBOT_RESEARCH_TS_AUTHKEY:-}
      - TS_AUTH_ONCE=true
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=false
      # Optional hardening/UX knobs:
      # - TS_ACCEPT_DNS=true
      # - TS_EXTRA_ARGS=--advertise-tags=tag:container
      - TS_HOSTNAME=${NANOBOT_RESEARCH_TS_HOSTNAME:-nanobot-research}
    volumes:
      - nanobot-research-tailscale-state:/var/lib/tailscale
    devices:
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
    restart: unless-stopped

  nanobot-research-gateway:
    network_mode: service:tailscale-research
    depends_on:
      - tailscale-research
    # Tailscale-only exposure: the gateway port is reachable via the tailnet,
    # but not published on the Docker host.
    ports: !reset []

volumes:
  nanobot-research-tailscale-state:
    driver: local
