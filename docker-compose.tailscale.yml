services:
  tailscale:
    image: tailscale/tailscale:latest
    container_name: nanobot-tailscale
    hostname: nanobot
    environment:
      # One-time auth on first boot; state persists across restarts.
      # Provide at runtime: NANOBOT_TS_AUTHKEY="tskey-..." docker compose ... up -d
      - TS_AUTHKEY=${NANOBOT_TS_AUTHKEY:-}
      - TS_AUTH_ONCE=true
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=false
      # Optional hardening/UX knobs:
      # - TS_ACCEPT_DNS=true
      # - TS_EXTRA_ARGS=--advertise-tags=tag:container
      - TS_HOSTNAME=${NANOBOT_TS_HOSTNAME:-nanobot}
    volumes:
      - nanobot-tailscale-state:/var/lib/tailscale
    devices:
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
    restart: unless-stopped

  nanobot-gateway:
    ports: !reset []
    network_mode: service:tailscale
    depends_on:
      - tailscale
    # Tailscale-only exposure: the gateway port is reachable via the tailnet,
    # but not published on the Docker host.
    ports: []

volumes:
  nanobot-tailscale-state:
    driver: local
